apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: annotation-ingress
  namespace: annotation
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "32m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["annotate.example.com"]
      secretName: annotation-tls
  rules:
    - host: annotate.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service: { name: annotation-api, port: { number: 80 } }
          - path: /
            pathType: Prefix
            backend:
              service: { name: annotation-frontend, port: { number: 80 } }
