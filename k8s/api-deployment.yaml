apiVersion: apps/v1
kind: Deployment
metadata:
  name: annotation-api
  namespace: annotation
  labels: { app: annotation-api }
spec:
  replicas: 3
  selector:
    matchLabels: { app: annotation-api }
  template:
    metadata:
      labels: { app: annotation-api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: ghcr.io/acme/fm-annotation-api:latest
          ports: [{ containerPort: 8000 }]
          envFrom:
            - configMapRef: { name: annotation-config }
            - secretRef: { name: annotation-secrets }
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /api/v1/health/ready, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/v1/health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: annotation-api
  namespace: annotation
spec:
  selector: { app: annotation-api }
  ports: [{ port: 80, targetPort: 8000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: annotation-api
  namespace: annotation
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: annotation-api
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 65 }
