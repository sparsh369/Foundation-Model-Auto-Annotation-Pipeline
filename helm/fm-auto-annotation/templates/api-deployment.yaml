apiVersion: apps/v1
kind: Deployment
metadata:
  name: annotation-api
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels: { app: annotation-api }
  template:
    metadata:
      labels: { app: annotation-api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.api.image }}:{{ .Values.api.tag }}"
          ports: [{ containerPort: 8000 }]
          envFrom:
            - configMapRef: { name: annotation-config }
            - secretRef: { name: annotation-secrets }
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          readinessProbe:
            httpGet: { path: /api/v1/health/ready, port: 8000 }
            initialDelaySeconds: 10
          livenessProbe:
            httpGet: { path: /api/v1/health, port: 8000 }
            initialDelaySeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: annotation-api
  namespace: {{ .Values.global.namespace }}
spec:
  selector: { app: annotation-api }
  ports: [{ port: 80, targetPort: 8000 }]
{{- if .Values.api.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: annotation-api
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: annotation-api }
  minReplicas: {{ .Values.api.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.api.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: {{ .Values.api.autoscaling.targetCPUUtilizationPercentage }} }
{{- end }}
