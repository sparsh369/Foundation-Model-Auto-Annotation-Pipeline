global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: workers
    static_configs:
      - targets: ["worker:9100"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
